# Phase 2 Extraction Configuration (fine-grained classes)

dataset_type: "snmot"
run_extraction: true
clean_output: true

snmot:
  copy_images: true
  include_empty_frames: true
  min_confidence: 0.2
  clamp_boxes: true
  balance_frames:
    enabled: true
    majority_classes:
      - team_left_player
      - team_right_player
    minority_classes:
      - goalkeeper_team_left
      - goalkeeper_team_right
      - referee_main
      - referee_side
      - ball
    majority_keep_prob: 0.4
    empty_keep_prob: 0.3
    duplicate_minority: 1
    instance_caps:
      enabled: false
      target_splits: ["train"]
      shuffle_sequences: true
      shuffle_frames: true
      classes: {}

  label_transform:
    enabled: true
    groups:
      team_left_player:
        - player_team_left
      team_right_player:
        - player_team_right
      goalkeeper_team_left:
        - goalkeeper_team_left
        - goalkeeper_captain_team_left
      goalkeeper_team_right:
        - goalkeeper_team_right
        - goalkeeper_captain_team_right
      referee_main:
        - referee_main
        - referee_central
      referee_side:
        - referee_side_top
        - referee_side_bottom
        - referee_side_left
        - referee_side_right
        - referee_side
        - referee_assistant
        - referee_assistant_left
        - referee_assistant_right
        - referee_assistant_top
        - referee_assistant_bottom
        - referee_fourth
      ball:
        - ball
    pattern_groups:
      referee_side:
        - "referee_side_*"
        - "referee_assistant_*"
    include:
      - team_left_player
      - team_right_player
      - goalkeeper_team_left
      - goalkeeper_team_right
      - referee_main
      - referee_side
      - ball
    drop_unmatched: true
    exclude: []
    rename: {}

max_samples_per_half: null
min_box_size: 4

class_names:
  - team_left_player
  - team_right_player
  - goalkeeper_team_left
  - goalkeeper_team_right
  - referee_main
  - referee_side
  - ball

season_splits:
  train: ["2014-2015"]
  val: ["2015-2016"]
  test: ["2016-2017"]

scale_mode: "scale"
validate_boxes: true
