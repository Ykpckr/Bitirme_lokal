# Phase 1 Extraction Configuration

# Dataset selection
dataset_type: "snmot"

# Extraction control
run_extraction: true
clean_output: true

# SNMOT-specific settings
snmot:
  copy_images: true
  include_empty_frames: true
  min_confidence: 0.25
  clamp_boxes: true
  balance_frames:
    enabled: true
    majority_classes:
      - team_left
      - team_right
    minority_classes:
      - ball
    majority_keep_prob: 0.35
    empty_keep_prob: 0.3
    duplicate_minority: 1
    instance_caps:
      enabled: false
      target_splits: ["train"]
      shuffle_sequences: true
      shuffle_frames: true
      classes: {}

  label_transform:
    enabled: true
    groups:
      team_left:
        - player_team_left
        - goalkeeper_team_left
        - goalkeeper_captain_team_left
      team_right:
        - player_team_right
        - goalkeeper_team_right
        - goalkeeper_captain_team_right
      ball:
        - ball
    include:
      - team_left
      - team_right
      - ball
    drop_unmatched: true
    exclude: []
    rename: {}
    pattern_groups: {}

# Sampling settings
max_samples_per_half: null
min_box_size: 4

# Class configuration
class_names:
  - team_left
  - team_right
  - ball

# Season splits (legacy)
season_splits:
  train: ["2014-2015"]
  val: ["2015-2016"]
  test: ["2016-2017"]

scale_mode: "scale"
validate_boxes: true
