# SNMOT Dual-Phase Dataset Specification
#
# Defines two extraction phases:
#   phase1 -> coarse team-vs-team vs ball dataset
#   phase2 -> fine-grained dataset separating goalkeepers and referees
#
# The script scripts/extract_dual_phase_snmot.py merges these overrides with
# the base extraction/paths YAML files.

phases:
  phase1_coarse:
    description: >-
      Players grouped by team (left/right) and the ball. Used for phase-1
      player-vs-team detection.
    paths:
      output_root: "data/yolo_players_snmot/phase1"
    class_names:
      - team_left
      - team_right
      - ball
    label_transform:
      enabled: true
      groups:
        team_left:
          - player_team_left
          - goalkeeper_team_left
          - goalkeeper_captain_team_left
        team_right:
          - player_team_right
          - goalkeeper_team_right
          - goalkeeper_captain_team_right
        ball:
          - ball
      include:
        - team_left
        - team_right
        - ball
      drop_unmatched: true

  phase2_fine:
    description: >-
      Keeps goalkeepers and referees as dedicated classes to support the
      second phase of training.
    paths:
      output_root: "data/yolo_players_snmot/phase2"
    class_names:
      - team_left_player
      - team_right_player
      - goalkeeper_team_left
      - goalkeeper_team_right
      - referee_main
      - referee_side
      - ball
    label_transform:
      enabled: true
      groups:
        team_left_player:
          - player_team_left
        team_right_player:
          - player_team_right
        goalkeeper_team_left:
          - goalkeeper_team_left
          - goalkeeper_captain_team_left
        goalkeeper_team_right:
          - goalkeeper_team_right
          - goalkeeper_captain_team_right
        referee_main:
          - referee_main
          - referee_central
        referee_side:
          - referee_side_top
          - referee_side_bottom
          - referee_side_left
          - referee_side_right
          - referee_assistant
          - referee_fourth
          - referee_side
          - referee_assistant_left
          - referee_assistant_right
          - referee_assistant_top
          - referee_assistant_bottom
        ball:
          - ball
      pattern_groups:
        referee_side:
          - "referee_side_*"
          - "referee_assistant_*"
      include:
        - team_left_player
        - team_right_player
        - goalkeeper_team_left
        - goalkeeper_team_right
        - referee_main
        - referee_side
        - ball
      drop_unmatched: true
