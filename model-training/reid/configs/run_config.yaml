# ReID Module - Run Configuration
# Çalıştırma için tüm parametreler

# Crop Extraction Parameters
extraction:
  video: null  # Video dosyası yolu (örn: /path/to/match.mp4)
  output_dir: /home/airborne/Desktop/eray/FoMAC/data/reid
  tracks: null  # Tracking results dosyası (opsiyonel)
  conf_threshold: 0.5
  player_class: 0
  frame_interval: 10
  max_frames: null  # null = tüm frameleri işle
  min_box_area: 1000
  min_crops_per_id: 10

# Training Parameters
training:
  config: configs/example_config.yaml
  resume_checkpoint: null  # Resume etmek için checkpoint yolu

# Evaluation Parameters
evaluation:
  config: configs/example_config.yaml
  checkpoint: null  # Değerlendirilecek checkpoint (null = best)

# Export Parameters
export:
  config: configs/example_config.yaml
  checkpoint: null  # Export edilecek checkpoint (null = best)
  test_after_export: true

# Pipeline Parameters (Tam çalıştırma için)
pipeline:
  enable_extraction: true  # Crop extraction yapılsın mı?
  enable_training: true
  enable_evaluation: true
  enable_export: true
  
  # Her aşama için parametreler yukarıdaki bölümlerden alınır
  
# General Settings
general:
  verbose: true  # Detaylı log
  save_logs: true  # Log'ları dosyaya kaydet
  log_file: outputs/reid/run.log
