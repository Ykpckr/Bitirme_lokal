# ReID Module - Example Configuration
# Örnek proje için ayarlar

# Model Configuration
model:
  backbone: resnet50
  emb_dim: 256
  pretrained: true
  last_stride: 1

# Loss Configuration
loss:
  ce_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  label_smooth: 0.1

# Training Configuration
train:
  epochs: 50              # 80 yerine 50 epoch (daha hızlı test için)
  batch_size: 32          # 64 yerine 32 (memory için)
  num_instances: 4
  lr: 0.0003
  optimizer: adamw
  weight_decay: 0.0005
  scheduler: warmup_cosine
  warmup_epochs: 5        # 10 yerine 5
  warmup_factor: 0.01
  grad_clip: 5.0
  save_period: 5          # Her 5 epoch'ta kaydet
  eval_period: 5          # Her 5 epoch'ta evaluate et

# Data Augmentation
augmentation:
  random_flip: 0.5
  random_crop: true
  random_erasing: 0.5
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  padding: 10

# Data Configuration  
data:
  root: /home/airborne/Desktop/eray/FoMAC/data/reid
  height: 256
  width: 128
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  train_dir: train
  query_dir: query
  gallery_dir: gallery

# Evaluation Configuration
eval:
  batch_size: 64
  metrics: [mAP, Rank1, Rank5, Rank10]
  rerank: false
  max_rank: 50

# Export Configuration
export:
  path: /home/airborne/Desktop/eray/FoMAC/outputs/reid/checkpoints/best_reid.pt
  format: pytorch

# Device Configuration
device:
  use_cuda: true
  gpu_ids: [0]
  num_workers: 4
  pin_memory: true

# Logging Configuration
logging:
  log_dir: /home/airborne/Desktop/eray/FoMAC/outputs/reid/logs
  tensorboard: true
  print_freq: 20

# Paths
paths:
  workspace_root: /home/airborne/Desktop/eray/FoMAC/model-training/reid
  data_root: /home/airborne/Desktop/eray/FoMAC/data/reid
  output_root: /home/airborne/Desktop/eray/FoMAC/outputs/reid
  yolo_weights: /home/airborne/Desktop/eray/FoMAC/model-training/ball-detection/models/player_ball_detector/weights/best.pt
